# Sample fwknopd server configuration file.
#
udp_port: 62201
bind_address: "127.0.0.1"
log_file: ""
syslog_identity: "fwknopd"
verbose: true
pid_file: /tmp/fwknopd-test.pid
run_dir: /tmp
max_spa_packet_age: 120
enable_digest_persistence: true

# Action templates define the commands executed on validated SPA requests.
# Use a predefined template file (looked up in action_dir):
#
#   action_template: iptables.yaml
#   action_dir: /etc/fwknop/actions   # default on Unix
#
# Available templates: iptables.yaml, nftables.yaml, firewalld.yaml, pf.yaml
# You can also specify an absolute path to a custom template file.
#
# Alternatively, define actions inline (overrides template on per-field basis):
#
# actions:
#   validate: "which iptables"
#   init: "iptables -N FWKNOP_INPUT 2>/dev/null; iptables -C INPUT -j FWKNOP_INPUT 2>/dev/null || iptables -I INPUT -j FWKNOP_INPUT"
#   check: "iptables -C FWKNOP_INPUT -s {{.SourceIP}} -p {{.Proto}} --dport {{.Port}} -j ACCEPT 2>/dev/null"
#   open: "iptables -A FWKNOP_INPUT -s {{.SourceIP}} -p {{.Proto}} --dport {{.Port}} -j ACCEPT"
#   close: "iptables -D FWKNOP_INPUT -s {{.SourceIP}} -p {{.Proto}} --dport {{.Port}} -j ACCEPT"
#   shutdown: "iptables -F FWKNOP_INPUT; iptables -D INPUT -j FWKNOP_INPUT; iptables -X FWKNOP_INPUT"
#
# Template variables: {{.SourceIP}}, {{.Proto}}, {{.Port}}, {{.Username}},
#   {{.Timestamp}}, {{.Timeout}}, {{.AccessMsg}}, {{.NATAccess}}

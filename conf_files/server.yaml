# --- PF (OpenBSD / macOS) ---
#
# Note: PF does not support deleting individual rules by match. The close
# command below flushes all rules in the fwknop anchor, so if multiple
# rules are active simultaneously, closing one closes all. This matches
# how the C fwknop handled PF.
#

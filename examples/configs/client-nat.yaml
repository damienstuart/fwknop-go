# Client configuration with NAT access.
# Requests the server forward connections to an internal host.
default:
  destination: gateway.example.com
  server_port: 62201
  access: tcp/22
  resolve_ip: true
  key_base64: "YOUR_BASE64_ENCRYPTION_KEY_HERE"
  hmac_key_base64: "YOUR_BASE64_HMAC_KEY_HERE"

# Connect to internal dev server via the gateway.
dev-server:
  nat_access: "10.0.1.50,22"

# Connect to internal database via the gateway.
database:
  access: tcp/5432
  nat_access: "10.0.1.100,5432"
